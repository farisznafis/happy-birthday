<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Cinematic Birthday Surprise</title>
        <script>
            /**
             * Fix for "Cannot set property fetch of #<Window> which has only a getter"
             * Some libraries pull in polyfills that try to overwrite the native read-only fetch.
             * We define a 'global' object that inherits from window, allowing shadow properties
             * to be set without affecting the sealed Window object.
             */
            if (typeof window !== "undefined" && !window.global) {
                window.global = Object.create(window);
            }
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="src/main.tsx"></script>
    </body>
</html>
